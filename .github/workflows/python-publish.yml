---
name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: 3.x
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip
          restore-keys: pip
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: python -m pip install --upgrade tox
      - run: python -m tox -e lint

  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - python: '3.10'
            toxenv: py310
          - python: '3.11'
            toxenv: py311
          - python: '3.12'
            toxenv: py312
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip
          restore-keys: pip
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: python -m pip install --upgrade tox
      - run: python -m tox -e ${{ matrix.toxenv }}

  deploy:
    needs: [lint, test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/sysrepo-python-plugind
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: 3.x
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip
          restore-keys: pip
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: python -m pip install --upgrade build
      - run: python -m build --outdir dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
