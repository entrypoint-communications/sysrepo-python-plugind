[tox]
envlist = py310, py311, py312, lint
requires = tox>=4
ignore_missing_interpreters = true

[testenv]
# tox-install.sh builds libyang and sysrepo C libraries from source before
# running pip install, so the sysrepo CFFI extension compiles correctly even
# when those system libraries are not installed (e.g. GitHub Actions).
install_command = {toxinidir}/tox-install.sh {toxworkdir} {opts} {packages}
extras = test
setenv =
    LIBYANG_BRANCH = v4.2.2
    SYSREPO_BRANCH = v4.2.10
allowlist_externals =
    {toxinidir}/tox-install.sh
commands = pytest {posargs}

[testenv:lint]
# No C dependencies here; use plain pip so tox-install.sh is not triggered.
install_command = python -m pip install {opts} {packages}
skip_install = true
deps =
    build
    twine
commands =
    python -m build --outdir {envtmpdir}/dist
    twine check {envtmpdir}/dist/*
